name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}

      - name: Package release archive (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="fgc-scoreboard-${VERSION}-${{ matrix.target }}"
          mkdir -p "$NAME"
          cp "server/target/${{ matrix.target }}/release/fgc-server" "$NAME/fgc-server"
          chmod +x "$NAME/fgc-server"
          cp -r web "$NAME/web"
          mkdir -p "$NAME/data"
          printf '%s\n' \
            'FGC Scoreboard release' \
            '' \
            'Run from this folder:' \
            '  ./fgc-server' \
            '' \
            'A public tunnel URL will be printed on startup.' \
            'LAN-only (no tunnel): ./fgc-server --no-tunnel' \
            > "$NAME/README-LAN.txt"
          tar czf "${NAME}.${{ matrix.archive }}" "$NAME"

      - name: Package release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME -replace '^v', ''
          $Name = "fgc-scoreboard-${Version}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $Name | Out-Null
          Copy-Item "server/target/${{ matrix.target }}/release/fgc-server.exe" "$Name/fgc-server.exe"
          Copy-Item -Recurse web "$Name/web"
          New-Item -ItemType Directory -Force -Path "$Name/data" | Out-Null
          @(
            'FGC Scoreboard release',
            '',
            'Run from this folder:',
            '  .\fgc-server.exe',
            '',
            'A public tunnel URL will be printed on startup.',
            'LAN-only (no tunnel): .\fgc-server.exe --no-tunnel'
          ) | Set-Content "$Name/README-LAN.txt"
          Compress-Archive -Path $Name -DestinationPath "${Name}.${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: fgc-scoreboard-*-${{ matrix.target }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
