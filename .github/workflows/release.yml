name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}

      - name: Package release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="fgc-scoreboard-${VERSION}-${{ matrix.target }}"
          mkdir -p "$NAME"
          cp "server/target/${{ matrix.target }}/release/fgc-server" "$NAME/fgc-server"
          cp -r web "$NAME/web"
          mkdir -p "$NAME/data"
          cat > "$NAME/README-LAN.txt" <<'EOF'
FGC Scoreboard LAN release

Run from this folder:
  ./fgc-server

Controller: http://<your-ip>:8080/
Overlay:    http://<your-ip>:8080/overlay/scoreboard.html
EOF
          tar czf "${NAME}.${{ matrix.archive }}" "$NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: fgc-scoreboard-*-${{ matrix.target }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
