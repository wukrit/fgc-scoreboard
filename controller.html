<!DOCTYPE html>
<!-- Pico CSS v2.1.1 (classless variant), vendored from jsDelivr -->
<html lang="en" data-theme="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>FGC Scoreboard Controller</title>
	<link rel="stylesheet" href="css/pico.classless.min.css">
	<style>
		/* === Neo-Brutalist Overrides === */
		:root {
			--pico-border-radius: 0;
			--pico-border-width: 3px;
			--pico-box-shadow: 4px 4px 0 #000;
			--surface: #222244;
			--bg: #1a1a2e;
			--text: #f0f0f0;
			--text-muted: #b8b8c8;
			--p1: #ff4444;
			--p2: #4488ff;
			--accent: #d4ff00;
			--focus-ring: #fff;
			--touch-min: 48px;
		}

		@media (prefers-reduced-motion: reduce) {
			*,
			*::before,
			*::after {
				animation-duration: 0.01ms !important;
				animation-iteration-count: 1 !important;
				transition-duration: 0.01ms !important;
				scroll-behavior: auto !important;
			}
		}

		body {
			background: var(--bg);
			color: var(--text);
			padding: 16px;
			padding-left: max(16px, env(safe-area-inset-left));
			padding-right: max(16px, env(safe-area-inset-right));
			max-width: 900px;
			margin: 0 auto;
		}

		.skip-link {
			position: absolute;
			left: -9999px;
			top: auto;
			width: 1px;
			height: 1px;
			overflow: hidden;
			z-index: 200;
			background: var(--accent);
			color: #000;
			font-weight: 700;
			padding: 12px 16px;
			border: 3px solid #000;
			text-decoration: none;
		}

		.skip-link:focus {
			position: fixed;
			left: 16px;
			top: 16px;
			width: auto;
			height: auto;
			overflow: visible;
		}

		h1 {
			font-size: clamp(1.125rem, 4vw, 1.5rem);
			font-weight: 900;
			text-align: center;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			margin: 0;
			color: #fff;
		}

		legend,
		.panel-title {
			font-size: 13px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.12em;
			margin-bottom: 12px;
			padding: 0;
		}

		fieldset {
			border: none;
			margin: 0;
			padding: 0;
			min-width: 0;
		}

		/* --- Players Grid --- */
		.players-grid {
			display: grid;
			grid-template-columns: 1fr;
			gap: 16px;
			margin-bottom: 16px;
		}

		@media (min-width: 768px) {
			.players-grid {
				grid-template-columns: 1fr 1fr;
			}
		}

		/* --- Player Sections --- */
		.player-section {
			background: var(--surface);
			border: 3px solid #000;
			box-shadow: 4px 4px 0 #000;
			padding: 16px;
			margin-bottom: 0;
		}

		.player-section.p1 {
			border-left: 6px solid var(--p1);
			background: rgba(255, 68, 68, 0.06);
		}
		.player-section.p1 .panel-title { color: var(--p1); }
		.player-section.p1 { --focus-ring: var(--p1); }

		.player-section.p2 {
			border-left: 6px solid var(--p2);
			background: rgba(68, 136, 255, 0.06);
		}
		.player-section.p2 .panel-title { color: var(--p2); }
		.player-section.p2 { --focus-ring: var(--p2); }

		/* --- Match Section --- */
		.match-section {
			background: var(--surface);
			border: 3px solid #000;
			box-shadow: 4px 4px 0 #000;
			padding: 16px;
			margin-bottom: 16px;
		}
		.match-section .panel-title { color: var(--text-muted); }

		/* --- Form Fields --- */
		.field-row {
			display: flex;
			flex-direction: column;
			gap: 10px;
			margin-bottom: 12px;
		}

		@media (min-width: 480px) {
			.field-row {
				flex-direction: row;
				gap: 8px;
			}
		}

		.field-row:last-child { margin-bottom: 0; }

		.field {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-width: 0;
		}

		.field label {
			font-size: 11px;
			font-weight: 700;
			color: var(--text-muted);
			margin-bottom: 4px;
			text-transform: uppercase;
			letter-spacing: 0.1em;
		}

		.field input,
		.field select {
			background: var(--bg);
			border: 3px solid #000;
			box-shadow: 3px 3px 0 #000;
			color: #fff;
			padding: 12px;
			font-size: 16px;
			width: 100%;
			min-height: var(--touch-min);
		}

		.field input::placeholder {
			color: #7a7a8a;
		}

		.field input:focus-visible,
		.field select:focus-visible,
		.score-display:focus-visible,
		.score-btn:focus-visible,
		.button-row button:focus-visible,
		#lock-btn:focus-visible,
		.auth-gate-panel input:focus-visible,
		.auth-gate-panel button:focus-visible {
			outline: 3px solid var(--focus-ring, #fff);
			outline-offset: 2px;
			border-color: #000;
		}

		.match-section,
		#controller-main {
			--focus-ring: var(--accent);
		}

		/* --- Score Stepper --- */
		.score-stepper {
			display: flex;
			align-items: stretch;
			gap: 0;
			margin-top: 4px;
			width: 100%;
		}

		.score-stepper .score-btn {
			flex: 0 0 64px;
			width: 64px;
			min-height: var(--touch-min);
			height: auto;
			font-size: 28px;
			font-weight: 900;
			border: 3px solid #000;
			box-shadow: 3px 3px 0 #000;
			background: #333;
			color: #fff;
			cursor: pointer;
			transition: transform 0.08s;
			touch-action: manipulation;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 0;
			text-transform: none;
			letter-spacing: 0;
		}

		.p1 .score-btn { background: var(--p1); color: #000; }
		.p2 .score-btn { background: var(--p2); color: #000; }

		@media (prefers-reduced-motion: no-preference) {
			.score-stepper .score-btn:active,
			.button-row button:active,
			.auth-gate-panel button:active {
				transform: translate(3px, 3px);
				box-shadow: 0 0 0 #000;
			}

			.button-row button:active {
				transform: translate(4px, 4px);
			}
		}

		.score-display {
			flex: 1;
			min-width: 72px;
			min-height: var(--touch-min);
			font-size: clamp(2rem, 8vw, 2.25rem);
			font-weight: 900;
			font-variant-numeric: tabular-nums;
			text-align: center;
			background: #111;
			border-top: 3px solid #000;
			border-bottom: 3px solid #000;
			border-left: none;
			border-right: none;
			color: #fff;
			box-shadow: none;
			padding: 0;
			cursor: text;
			display: flex;
			align-items: center;
			justify-content: center;
			line-height: 1;
		}

		/* --- Team Field --- */
		@media (min-width: 480px) {
			.field-team {
				flex: 0 0 112px;
				max-width: 112px;
			}
		}

		.field-hint {
			font-size: 12px;
			color: var(--text-muted);
			margin-top: 6px;
		}

		.game-mode-toggle {
			background: none;
			border: none;
			box-shadow: none;
			color: var(--accent);
			font-size: 12px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			padding: 8px 0 0;
			margin: 0;
			cursor: pointer;
			text-align: left;
			min-height: auto;
			text-decoration: underline;
			text-underline-offset: 2px;
			touch-action: manipulation;
		}

		.game-mode-toggle:focus-visible {
			outline: 3px solid var(--accent);
			outline-offset: 2px;
		}

		.game-field [hidden] {
			display: none !important;
		}

		/* --- Buttons --- */
		.actions-wrap {
			display: flex;
			flex-direction: column;
			gap: 8px;
			margin-bottom: 8px;
		}

		.button-row {
			display: flex;
			gap: 8px;
		}

		.button-row button {
			flex: 1;
			border: 3px solid #000;
			box-shadow: 4px 4px 0 #000;
			font-size: 14px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			padding: 14px 12px;
			cursor: pointer;
			transition: transform 0.08s;
			min-height: var(--touch-min);
			touch-action: manipulation;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
		}

		.btn-save {
			background: var(--accent);
			color: #000;
		}
		.btn-swap {
			background: #444;
			color: #fff;
		}
		.btn-reset {
			background: #2a2a2a;
			color: #ddd;
		}
		.btn-clear {
			background: #1a1a1a;
			color: #aaa;
			font-size: 13px;
		}

		/* Sticky primary actions on mobile */
		.actions-primary {
			margin-bottom: 0;
		}

		@media (max-width: 767px) {
			body.has-sticky-actions {
				padding-bottom: calc(88px + env(safe-area-inset-bottom, 0px));
			}

			.actions-primary {
				position: fixed;
				left: 0;
				right: 0;
				bottom: 0;
				z-index: 40;
				margin: 0;
				padding: 12px 16px;
				padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
				padding-left: max(16px, env(safe-area-inset-left));
				padding-right: max(16px, env(safe-area-inset-right));
				background: var(--bg);
				border-top: 3px solid #000;
				box-shadow: 0 -4px 0 rgba(0, 0, 0, 0.35);
			}

			.actions-primary .btn-save,
			.actions-primary .btn-swap {
				min-height: 52px;
				font-size: 15px;
			}
		}

		/* --- Status Indicator --- */
		#status {
			text-align: center;
			font-size: 13px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			padding: 10px;
			margin-top: 8px;
			border: 3px solid transparent;
			visibility: hidden;
		}

		.status-ok {
			background: #0a3d0a;
			color: #6ee06e;
			border-color: #4caf50 !important;
		}
		.status-err {
			background: #3d0a0a;
			color: #ff6b6b;
			border-color: #f44336 !important;
		}
		.status-loading {
			background: #3d3d0a;
			color: #ffeb3b;
			border-color: #ffeb3b !important;
		}

		/* --- Mode Warning --- */
		#no-bin-warning {
			background: var(--surface);
			color: #ffeb3b;
			text-align: center;
			padding: 12px;
			margin-bottom: 16px;
			font-size: 13px;
			font-weight: 700;
			border: 3px solid #ffeb3b;
			display: none;
		}

		#no-bin-warning a {
			color: #ffeb3b;
			text-underline-offset: 2px;
		}

		/* --- Auth Gate --- */
		#auth-gate {
			position: fixed;
			inset: 0;
			z-index: 100;
			background: rgba(26, 26, 46, 0.97);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 16px;
			padding-left: max(16px, env(safe-area-inset-left));
			padding-right: max(16px, env(safe-area-inset-right));
		}

		#auth-gate[hidden] {
			display: none !important;
		}

		.auth-gate-panel {
			background: var(--surface);
			border: 3px solid #000;
			box-shadow: 8px 8px 0 #000;
			padding: 24px;
			width: 100%;
			max-width: 360px;
		}

		.auth-gate-panel h2 {
			text-align: center;
			color: var(--accent);
			margin-bottom: 16px;
		}

		.auth-gate-panel label {
			display: block;
			font-size: 11px;
			font-weight: 700;
			color: var(--text-muted);
			margin-bottom: 6px;
			text-transform: uppercase;
			letter-spacing: 0.1em;
		}

		.auth-gate-panel input {
			width: 100%;
			background: var(--bg);
			border: 3px solid #000;
			box-shadow: 3px 3px 0 #000;
			color: #fff;
			padding: 12px;
			font-size: 16px;
			margin-bottom: 12px;
			min-height: var(--touch-min);
		}

		.auth-gate-panel button {
			width: 100%;
			background: var(--accent);
			color: #000;
			border: 3px solid #000;
			box-shadow: 4px 4px 0 #000;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			padding: 14px;
			cursor: pointer;
			min-height: var(--touch-min);
		}

		#auth-gate-error {
			color: #ff6b6b;
			font-size: 13px;
			font-weight: 700;
			text-align: center;
			margin-top: 12px;
			min-height: 1.2em;
		}

		.page-header {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 12px;
			margin-bottom: 16px;
			flex-wrap: wrap;
		}

		#lock-btn {
			background: #444;
			color: #ddd;
			border: 3px solid #000;
			box-shadow: 3px 3px 0 #000;
			font-size: 11px;
			font-weight: 700;
			text-transform: uppercase;
			padding: 10px 12px;
			cursor: pointer;
			min-height: var(--touch-min);
		}

		#lock-btn[hidden] {
			display: none !important;
		}
	</style>
</head>
<body class="has-sticky-actions">
	<a class="skip-link" href="#controller-main">Skip to controller</a>

	<div id="auth-gate" hidden role="dialog" aria-modal="true" aria-labelledby="auth-gate-title">
		<div class="auth-gate-panel">
			<h2 id="auth-gate-title">Operator Token</h2>
			<form id="auth-gate-form" onsubmit="event.preventDefault(); unlockController();">
				<label for="auth-token-input">Access token</label>
				<input type="password" id="auth-token-input" name="token" autocomplete="off" inputmode="text" placeholder="Enter token" aria-describedby="auth-gate-error">
				<button type="submit">Unlock</button>
			</form>
			<p id="auth-gate-error" role="alert"></p>
		</div>
	</div>

	<main id="controller-main">
		<header class="page-header">
			<h1>FGC Scoreboard</h1>
			<button type="button" id="lock-btn" onclick="lockController()" hidden aria-label="Lock controller and require token again">Lock</button>
		</header>

		<div id="no-bin-warning" role="status" aria-live="polite">
			No bin ID found. Add <strong>?bin=YOUR_ID</strong> to the URL.<br>
			Create a free bin at <a href="https://www.npoint.io" target="_blank" rel="noopener noreferrer">npoint.io</a>
		</div>

		<form id="scoreboard-form" onsubmit="event.preventDefault(); save();" aria-describedby="status">
			<div class="players-grid">
				<section class="player-section p1" aria-labelledby="p1-heading">
					<fieldset>
						<legend id="p1-heading" class="panel-title">Player 1</legend>
						<div class="field-row">
							<div class="field">
								<label for="p1Name">Name</label>
								<input type="text" id="p1Name" name="p1Name" placeholder="Player 1" maxlength="64" autocomplete="off">
							</div>
							<div class="field field-team">
								<label for="p1Team">Team</label>
								<input type="text" id="p1Team" name="p1Team" placeholder="Team" maxlength="32" autocomplete="off">
							</div>
						</div>
						<div class="score-stepper" role="group" aria-labelledby="p1-score-label">
							<span id="p1-score-label" class="visually-hidden">Player 1 score</span>
							<button type="button" class="score-btn" onclick="adjustScore('p1Score', -1)" aria-label="Decrease Player 1 score">&minus;</button>
							<input type="text" id="p1Score" name="p1Score" value="0" class="score-display" inputmode="numeric" pattern="[0-9]*" maxlength="2" aria-label="Player 1 score" onblur="commitScore('p1Score')" oninput="filterScoreInput('p1Score')" onkeydown="handleScoreKeydown(event, 'p1Score')">
							<button type="button" class="score-btn" onclick="adjustScore('p1Score', 1)" aria-label="Increase Player 1 score">+</button>
						</div>
					</fieldset>
				</section>

				<section class="player-section p2" aria-labelledby="p2-heading">
					<fieldset>
						<legend id="p2-heading" class="panel-title">Player 2</legend>
						<div class="field-row">
							<div class="field">
								<label for="p2Name">Name</label>
								<input type="text" id="p2Name" name="p2Name" placeholder="Player 2" maxlength="64" autocomplete="off">
							</div>
							<div class="field field-team">
								<label for="p2Team">Team</label>
								<input type="text" id="p2Team" name="p2Team" placeholder="Team" maxlength="32" autocomplete="off">
							</div>
						</div>
						<div class="score-stepper" role="group" aria-labelledby="p2-score-label">
							<span id="p2-score-label" class="visually-hidden">Player 2 score</span>
							<button type="button" class="score-btn" onclick="adjustScore('p2Score', -1)" aria-label="Decrease Player 2 score">&minus;</button>
							<input type="text" id="p2Score" name="p2Score" value="0" class="score-display" inputmode="numeric" pattern="[0-9]*" maxlength="2" aria-label="Player 2 score" onblur="commitScore('p2Score')" oninput="filterScoreInput('p2Score')" onkeydown="handleScoreKeydown(event, 'p2Score')">
							<button type="button" class="score-btn" onclick="adjustScore('p2Score', 1)" aria-label="Increase Player 2 score">+</button>
						</div>
					</fieldset>
				</section>
			</div>

			<section class="match-section" aria-labelledby="match-heading">
				<fieldset>
					<legend id="match-heading" class="panel-title">Match Info</legend>
					<div class="field-row">
						<div class="field">
							<label for="round">Round</label>
							<input type="text" id="round" name="round" placeholder="e.g. Grand Finals" maxlength="64" autocomplete="off">
						</div>
						<div class="field game-field">
							<label for="game-select">Game</label>
							<select id="game-select" aria-describedby="game-hint">
								<option value="">Select game</option>
								<option value="BBCF">BBCF</option>
								<option value="BBTAG">BBTAG</option>
								<option value="DBFZ">DBFZ</option>
								<option value="GGXRD">GGXRD</option>
								<option value="KOFXIV">KOFXIV</option>
								<option value="MVCI">MVCI</option>
								<option value="SF6">SF6</option>
								<option value="SFVCE">SFVCE</option>
								<option value="TEKKEN7">TEKKEN7</option>
								<option value="UMVC3">UMVC3</option>
								<option value="UNICLR">UNICLR</option>
								<option value="USF4">USF4</option>
							</select>
							<input type="text" id="game-custom" hidden maxlength="32" placeholder="Custom game name" autocomplete="off" aria-label="Custom game name" aria-describedby="game-hint">
							<button type="button" class="game-mode-toggle" id="game-mode-toggle" onclick="toggleGameMode()">Enter custom name</button>
							<p id="game-hint" class="field-hint">Choose a preset from the list.</p>
						</div>
					</div>
				</fieldset>
			</section>

			<div class="actions-wrap">
				<div class="button-row actions-secondary" role="group" aria-label="Secondary match actions">
					<button type="button" class="btn-reset" onclick="resetScores()">Reset Scores</button>
					<button type="button" class="btn-clear" onclick="clearAll()">Clear All</button>
				</div>
				<div class="button-row actions-primary" role="group" aria-label="Primary match actions">
					<button type="submit" class="btn-save">Save</button>
					<button type="button" class="btn-swap" onclick="swap()">Swap</button>
				</div>
			</div>
		</form>

		<div id="status" role="status" aria-live="polite" aria-atomic="true">&nbsp;</div>
	</main>

	<style>
		.visually-hidden {
			position: absolute;
			width: 1px;
			height: 1px;
			padding: 0;
			margin: -1px;
			overflow: hidden;
			clip: rect(0, 0, 0, 0);
			white-space: nowrap;
			border: 0;
		}
	</style>

	<script>
		var AUTH_STORAGE_KEY = 'fgc-auth-token';
		var authRequired = false;
		var GAME_PRESETS = ['BBCF', 'BBTAG', 'DBFZ', 'GGXRD', 'KOFXIV', 'MVCI', 'SF6', 'SFVCE', 'TEKKEN7', 'UMVC3', 'UNICLR', 'USF4'];

		function isPresetGame(val) {
			return GAME_PRESETS.indexOf(val) !== -1;
		}

		function showCustomGame(show) {
			var customEl = document.getElementById('game-custom');
			var selectEl = document.getElementById('game-select');
			var toggleEl = document.getElementById('game-mode-toggle');
			var hintEl = document.getElementById('game-hint');
			customEl.hidden = !show;
			selectEl.hidden = show;
			toggleEl.textContent = show ? 'Use preset list' : 'Enter custom name';
			hintEl.textContent = show ? 'Type any game name.' : 'Choose a preset from the list.';
		}

		function toggleGameMode() {
			var customEl = document.getElementById('game-custom');
			var goingCustom = customEl.hidden;
			if (goingCustom) {
				var selected = document.getElementById('game-select').value;
				if (selected) customEl.value = selected;
				showCustomGame(true);
				customEl.focus();
				return;
			}
			var typed = customEl.value.trim();
			if (isPresetGame(typed)) document.getElementById('game-select').value = typed;
			else document.getElementById('game-select').value = '';
			showCustomGame(false);
		}

		function getGameValue() {
			var customEl = document.getElementById('game-custom');
			if (!customEl.hidden) return customEl.value.trim();
			return document.getElementById('game-select').value;
		}

		function setGameValue(val) {
			val = val || '';
			if (val && !isPresetGame(val)) {
				document.getElementById('game-custom').value = val;
				showCustomGame(true);
				return;
			}
			document.getElementById('game-select').value = val;
			document.getElementById('game-custom').value = '';
			showCustomGame(false);
		}

		var urlParams = new URLSearchParams(window.location.search);
		var binId = urlParams.get('bin');
		var apiUrl = binId ? 'https://api.npoint.io/' + binId : null;
		var lanMode = !binId && window.location.protocol !== 'file:';
		var localMode = !apiUrl && !lanMode;

		function isHostedMode() {
			return lanMode && window.location.protocol === 'https:' && authRequired;
		}

		function updateServerModeBanner() {
			if (!lanMode) return;
			var warning = document.getElementById('no-bin-warning');
			if (isHostedMode()) {
				warning.style.display = 'none';
				return;
			}
			warning.textContent = 'LAN mode - connected to ' + window.location.host;
			warning.style.display = 'block';
		}

		var bootstrapToken = urlParams.get('token');
		if (bootstrapToken) {
			sessionStorage.setItem(AUTH_STORAGE_KEY, bootstrapToken);
			urlParams.delete('token');
			var cleanQuery = urlParams.toString();
			var cleanUrl = window.location.pathname + (cleanQuery ? '?' + cleanQuery : '');
			history.replaceState(null, '', cleanUrl);
		}

		function getAuthToken() {
			return sessionStorage.getItem(AUTH_STORAGE_KEY) || '';
		}

		function setAuthToken(token) {
			if (token) sessionStorage.setItem(AUTH_STORAGE_KEY, token);
			else sessionStorage.removeItem(AUTH_STORAGE_KEY);
		}

		function authHeaders(extra) {
			var h = Object.assign({}, extra || {});
			var token = getAuthToken();
			if (token) h['Authorization'] = 'Bearer ' + token;
			return h;
		}

		function authFetch(url, options) {
			options = options || {};
			options.headers = authHeaders(options.headers);
			return fetch(url, options);
		}

		function showAuthGate() {
			document.getElementById('auth-gate').hidden = false;
			document.getElementById('lock-btn').hidden = true;
			document.getElementById('auth-token-input').focus();
		}

		function hideAuthGate() {
			document.getElementById('auth-gate').hidden = true;
			if (authRequired) document.getElementById('lock-btn').hidden = false;
		}

		function verifyToken() {
			return authFetch(window.location.origin + '/auth/check')
				.then(function(r) {
					if (r.status === 204) {
						hideAuthGate();
						return true;
					}
					setAuthToken('');
					showAuthGate();
					return false;
				})
				.catch(function() {
					setAuthToken('');
					showAuthGate();
					return false;
				});
		}

		function unlockController() {
			var input = document.getElementById('auth-token-input');
			var errEl = document.getElementById('auth-gate-error');
			setAuthToken(input.value.trim());
			errEl.textContent = '';
			verifyToken().then(function(ok) {
				if (!ok) errEl.textContent = 'Invalid token';
				else input.value = '';
			});
		}

		function lockController() {
			setAuthToken('');
			document.getElementById('auth-token-input').value = '';
			document.getElementById('auth-gate-error').textContent = '';
			showAuthGate();
		}

		if (lanMode) {
			if (window.location.protocol !== 'https:') {
				console.log('LAN MODE');
				updateServerModeBanner();
			}
		} else if (localMode) {
			console.log('LOCAL MODE');
			var warning = document.getElementById('no-bin-warning');
			warning.textContent = 'Local mode - data saved to this browser only.';
			warning.style.display = 'block';
		}

		var lastSyncedTimestamp = '';
		var initialSyncDone = false;

		function isFieldFocused(id) {
			var el = document.activeElement;
			return el && el.id === id;
		}

		function isGameFocused() {
			var el = document.activeElement;
			if (!el) return false;
			var id = el.id;
			return id === 'game-select' || id === 'game-custom' || id === 'game-mode-toggle';
		}

		function applyField(id, value, defaultVal) {
			if (isFieldFocused(id)) return false;
			var el = document.getElementById(id);
			var strVal = value !== undefined && value !== '' ? value : (defaultVal !== undefined ? defaultVal : '');
			if (el.value !== strVal) {
				el.value = strVal;
				return true;
			}
			return false;
		}

		function populateForm(data) {
			document.getElementById('p1Name').value = data.p1Name || '';
			document.getElementById('p1Team').value = data.p1Team || '';
			document.getElementById('p1Score').value = data.p1Score || '0';
			document.getElementById('p2Name').value = data.p2Name || '';
			document.getElementById('p2Team').value = data.p2Team || '';
			document.getElementById('p2Score').value = data.p2Score || '0';
			document.getElementById('round').value = data.round || '';
			setGameValue(data.game || '');
			lastSyncedTimestamp = data.timestamp || '';
		}

		function applyRemoteData(data) {
			if (data.p1Name === undefined) return;
			if (isSaving) return;
			if (data.timestamp === lastSyncedTimestamp) return;

			var changed = false;
			changed = applyField('p1Name', data.p1Name) || changed;
			changed = applyField('p1Team', data.p1Team) || changed;
			changed = applyField('p1Score', data.p1Score, '0') || changed;
			changed = applyField('p2Name', data.p2Name) || changed;
			changed = applyField('p2Team', data.p2Team) || changed;
			changed = applyField('p2Score', data.p2Score, '0') || changed;
			changed = applyField('round', data.round) || changed;
			if (!isGameFocused()) {
				var gameVal = data.game || '';
				if (getGameValue() !== gameVal) {
					setGameValue(gameVal);
					changed = true;
				}
			}

			lastSyncedTimestamp = data.timestamp || '';

			if (changed) {
				var statusEl = document.getElementById('status');
				if (statusEl.className !== 'status-loading') {
					showStatus(initialSyncDone ? 'Synced' : 'Loaded', 'ok');
					initialSyncDone = true;
				}
			}
		}

		function createPoller(url, fetchFn, callback) {
			var abortCtrl = null;
			function poll() {
				if (abortCtrl) abortCtrl.abort();
				abortCtrl = new AbortController();
				fetchFn(url + '?v=' + Date.now(), { signal: abortCtrl.signal })
					.then(function(r) { return r.json(); })
					.then(callback)
					.catch(function() { /* silent retry next tick */ });
			}
			poll();
			setInterval(poll, 1000);
		}

		function startSync() {
			if (apiUrl) {
				showStatus('Loading...', 'loading');
				createPoller(apiUrl, fetch, applyRemoteData);
			} else if (lanMode) {
				createPoller(window.location.origin + '/scoreboard.json', authFetch, applyRemoteData);
			} else {
				window.addEventListener('storage', function(evt) {
					if (evt.key === 'fgc-scoreboard-data' && evt.newValue) {
						try { applyRemoteData(JSON.parse(evt.newValue)); } catch(e) {}
					}
				});
			}
		}

		function initAuthGate() {
			authFetch(window.location.origin + '/scoreboard.json')
				.then(function(r) {
					authRequired = r.headers.get('X-FGC-Auth-Required') === '1';
					if (isHostedMode()) console.log('HOSTED MODE');
					else if (lanMode) console.log('LAN MODE');
					updateServerModeBanner();
					startSync();
					if (authRequired) {
						if (getAuthToken()) {
							return verifyToken().then(function(ok) {
								if (!ok) showStatus('Enter token to continue', 'err');
							});
						}
						showAuthGate();
						showStatus('Enter token to continue', 'err');
					}
				})
				.catch(function() {
					showStatus('Could not load data from server', 'err');
					startSync();
				});
		}

		if (apiUrl) {
			startSync();
		} else if (lanMode) {
			initAuthGate();
		} else {
			var stored = localStorage.getItem('fgc-scoreboard-data');
			if (stored) {
				try {
					populateForm(JSON.parse(stored));
					initialSyncDone = true;
				} catch(e) {
					console.warn('Failed to parse localStorage data:', e);
				}
			}
			startSync();
		}

		function normalizeScore(id) {
			var input = document.getElementById(id);
			var val = parseInt(input.value, 10);
			if (isNaN(val)) val = 0;
			val = Math.max(0, Math.min(99, val));
			input.value = String(val);
			return val;
		}

		function commitScore(id) {
			normalizeScore(id);
			save();
		}

		function filterScoreInput(id) {
			var input = document.getElementById(id);
			var digits = input.value.replace(/\D/g, '');
			if (digits !== input.value) input.value = digits;
		}

		function handleScoreKeydown(e, id) {
			if (e.key === 'Enter') {
				e.preventDefault();
				document.getElementById(id).blur();
			}
		}

		function adjustScore(id, delta) {
			var input = document.getElementById(id);
			var val = parseInt(input.value, 10) || 0;
			input.value = String(val + delta);
			normalizeScore(id);
			save();
		}

		function getFormData() {
			var p1Raw = parseInt(document.getElementById('p1Score').value, 10) || 0;
			var p2Raw = parseInt(document.getElementById('p2Score').value, 10) || 0;
			return {
				p1Name: document.getElementById('p1Name').value,
				p1Team: document.getElementById('p1Team').value,
				p1Score: String(Math.max(0, Math.min(99, p1Raw))),
				p2Name: document.getElementById('p2Name').value,
				p2Team: document.getElementById('p2Team').value,
				p2Score: String(Math.max(0, Math.min(99, p2Raw))),
				round: document.getElementById('round').value,
				game: getGameValue(),
				timestamp: String(Math.floor(Date.now() / 1000))
			};
		}

		var isSaving = false;
		function save() {
			if (isSaving) return;
			if (lanMode && authRequired && !getAuthToken()) return;
			var formData = getFormData();
			if (localMode) {
				try {
					localStorage.setItem('fgc-scoreboard-data', JSON.stringify(formData));
					lastSyncedTimestamp = formData.timestamp;
					showStatus('Saved (local)', 'ok');
				} catch(e) {
					showStatus('Save failed: ' + e.message, 'err');
				}
				return;
			}
			isSaving = true;
			var saveUrl = lanMode ? window.location.origin + '/scoreboard.json' : apiUrl;
			showStatus('Saving...', 'loading');
			var fetchFn = lanMode ? authFetch : fetch;
			var postHeaders = { 'Content-Type': 'application/json' };
			fetchFn(saveUrl, {
				method: 'POST',
				headers: postHeaders,
				body: JSON.stringify(formData)
			})
			.then(function(r) {
				if (r.status === 401 && lanMode) {
					setAuthToken('');
					showAuthGate();
					showStatus('Session expired - re-enter token', 'err');
					throw new Error('auth');
				}
				if (!r.ok) throw new Error('HTTP ' + r.status);
				lastSyncedTimestamp = formData.timestamp;
				showStatus(lanMode && !isHostedMode() ? 'Saved (LAN)' : 'Saved', 'ok');
			})
			.catch(function(e) {
				if (e && e.message === 'auth') return;
				showStatus('Save failed - check server connection', 'err');
			})
			.finally(function() {
				isSaving = false;
			});
		}

		function swap() {
			var fields = ['Name', 'Team', 'Score'];
			fields.forEach(function(f) {
				var p1 = document.getElementById('p1' + f);
				var p2 = document.getElementById('p2' + f);
				var tmp = p1.value;
				p1.value = p2.value;
				p2.value = tmp;
			});
		}

		function resetScores() {
			document.getElementById('p1Score').value = '0';
			document.getElementById('p2Score').value = '0';
		}

		function clearAll() {
			document.getElementById('p1Name').value = '';
			document.getElementById('p1Team').value = '';
			document.getElementById('p1Score').value = '0';
			document.getElementById('p2Name').value = '';
			document.getElementById('p2Team').value = '';
			document.getElementById('p2Score').value = '0';
			document.getElementById('round').value = '';
			setGameValue('');
		}

		var statusTimeoutId = null;
		function showStatus(msg, type) {
			var el = document.getElementById('status');
			if (statusTimeoutId !== null) {
				clearTimeout(statusTimeoutId);
				statusTimeoutId = null;
			}
			el.textContent = msg;
			el.className = 'status-' + type;
			el.style.visibility = 'visible';
			if (type === 'ok') {
				statusTimeoutId = setTimeout(function() {
					el.style.visibility = 'hidden';
					el.textContent = '\u00a0';
					statusTimeoutId = null;
				}, 2000);
			}
		}
	</script>
</body>
</html>
