<!DOCTYPE html>
<!-- Pico CSS v2.1.1 (classless variant), vendored from jsDelivr -->
<html lang="en" data-theme="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FGC Scoreboard Controller</title>
	<link rel="stylesheet" href="css/pico.classless.min.css">
	<style>
		/* === Neo-Brutalist Overrides === */
		:root {
			--pico-border-radius: 0;
			--pico-border-width: 3px;
			--pico-box-shadow: 4px 4px 0 #000;
		}

		body {
			background: #1a1a2e;
			color: #f0f0f0;
			padding: 16px;
			max-width: 900px;
			margin: 0 auto;
		}

		h1 {
			font-size: 24px;
			font-weight: 900;
			text-align: center;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			margin-bottom: 16px;
			color: #fff;
		}

		h2 {
			font-size: 13px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.12em;
			margin-bottom: 12px;
		}

		/* --- Players Grid --- */
		.players-grid {
			display: grid;
			grid-template-columns: 1fr;
			gap: 16px;
			margin-bottom: 16px;
		}

		@media (min-width: 768px) {
			.players-grid {
				grid-template-columns: 1fr 1fr;
			}
		}

		/* --- Player Sections --- */
		.player-section {
			background: #222244;
			border: 3px solid #000;
			box-shadow: 4px 4px 0 #000;
			padding: 16px;
			margin-bottom: 0;
		}

		.player-section.p1 {
			border-left: 6px solid #ff4444;
			background: rgba(255, 68, 68, 0.06);
		}
		.player-section.p1 h2 { color: #ff4444; }

		.player-section.p2 {
			border-left: 6px solid #4488ff;
			background: rgba(68, 136, 255, 0.06);
		}
		.player-section.p2 h2 { color: #4488ff; }

		/* --- Match Section --- */
		.match-section {
			background: #222244;
			border: 3px solid #000;
			box-shadow: 4px 4px 0 #000;
			padding: 16px;
			margin-bottom: 16px;
		}
		.match-section h2 { color: #888; }

		/* --- Form Fields --- */
		.field-row {
			display: flex;
			gap: 8px;
			margin-bottom: 10px;
		}
		.field-row:last-child { margin-bottom: 0; }

		.field {
			flex: 1;
			display: flex;
			flex-direction: column;
		}

		.field label {
			font-size: 11px;
			font-weight: 700;
			color: #888;
			margin-bottom: 4px;
			text-transform: uppercase;
			letter-spacing: 0.1em;
		}

		.field input,
		.field select {
			background: #1a1a2e;
			border: 3px solid #000;
			box-shadow: 3px 3px 0 #000;
			color: #fff;
			padding: 10px;
			font-size: 16px;
			width: 100%;
		}

		.field input:focus,
		.field select:focus {
			outline: 3px solid #fff;
			outline-offset: -3px;
			border-color: #000;
		}

		.p1 .field input:focus { outline-color: #ff4444; }
		.p2 .field input:focus { outline-color: #4488ff; }

		/* --- Score Stepper --- */
		.score-stepper {
			display: flex;
			align-items: center;
			gap: 0;
			margin-top: 8px;
		}

		.score-stepper .score-btn {
			width: 56px;
			height: 56px;
			min-height: 48px;
			font-size: 24px;
			font-weight: 900;
			border: 3px solid #000;
			box-shadow: 3px 3px 0 #000;
			background: #333;
			color: #fff;
			cursor: pointer;
			transition: transform 0.08s;
			touch-action: manipulation;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 0;
			text-transform: none;
			letter-spacing: 0;
		}

		.p1 .score-btn { background: #ff4444; color: #000; }
		.p2 .score-btn { background: #4488ff; color: #000; }

		.score-stepper .score-btn:active {
			transform: translate(3px, 3px);
			box-shadow: 0 0 0 #000;
		}

		.score-display {
			width: 72px;
			height: 56px;
			font-size: 36px;
			font-weight: 900;
			font-variant-numeric: tabular-nums;
			text-align: center;
			background: #111;
			border-top: 3px solid #000;
			border-bottom: 3px solid #000;
			border-left: none;
			border-right: none;
			color: #fff;
			box-shadow: none;
			padding: 0;
			cursor: text;
			display: flex;
			align-items: center;
			justify-content: center;
			line-height: 1;
		}

		.score-display:focus {
			outline: 3px solid #fff;
			outline-offset: -3px;
			border-color: #000;
		}

		.p1 .score-display:focus { outline-color: #ff4444; }
		.p2 .score-display:focus { outline-color: #4488ff; }

		/* --- Team Field --- */
		.field-team { max-width: 100px; }

		/* --- Buttons --- */
		.button-row {
			display: flex;
			gap: 8px;
			margin-bottom: 8px;
		}

		.button-row button {
			flex: 1;
			border: 3px solid #000;
			box-shadow: 4px 4px 0 #000;
			font-size: 14px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			padding: 14px 8px;
			cursor: pointer;
			transition: transform 0.08s;
			min-height: 48px;
			touch-action: manipulation;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
		}

		.button-row button:active {
			transform: translate(4px, 4px);
			box-shadow: 0 0 0 #000;
		}

		.btn-save {
			background: #d4ff00;
			color: #000;
		}
		.btn-swap {
			background: #444;
			color: #fff;
		}
		.btn-reset {
			background: #2a2a2a;
			color: #aaa;
		}
		.btn-clear {
			background: #1a1a1a;
			color: #666;
			font-size: 12px;
		}

		/* --- Status Indicator --- */
		#status {
			text-align: center;
			font-size: 13px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			padding: 10px;
			margin-top: 8px;
			border: 3px solid transparent;
			visibility: hidden;
		}

		.status-ok {
			background: #0a3d0a;
			color: #4caf50;
			border-color: #4caf50 !important;
		}
		.status-err {
			background: #3d0a0a;
			color: #f44336;
			border-color: #f44336 !important;
		}
		.status-loading {
			background: #3d3d0a;
			color: #ffeb3b;
			border-color: #ffeb3b !important;
		}

		/* --- Mode Warning --- */
		#no-bin-warning {
			background: #222244;
			color: #ffeb3b;
			text-align: center;
			padding: 12px;
			margin-bottom: 16px;
			font-size: 13px;
			font-weight: 700;
			border: 3px solid #ffeb3b;
			display: none;
		}

		/* --- Auth Gate --- */
		#auth-gate {
			position: fixed;
			inset: 0;
			z-index: 100;
			background: rgba(26, 26, 46, 0.97);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 16px;
		}

		#auth-gate[hidden] {
			display: none !important;
		}

		.auth-gate-panel {
			background: #222244;
			border: 3px solid #000;
			box-shadow: 8px 8px 0 #000;
			padding: 24px;
			width: 100%;
			max-width: 360px;
		}

		.auth-gate-panel h2 {
			text-align: center;
			color: #d4ff00;
			margin-bottom: 16px;
		}

		.auth-gate-panel input {
			width: 100%;
			background: #1a1a2e;
			border: 3px solid #000;
			box-shadow: 3px 3px 0 #000;
			color: #fff;
			padding: 12px;
			font-size: 16px;
			margin-bottom: 12px;
		}

		.auth-gate-panel button {
			width: 100%;
			background: #d4ff00;
			color: #000;
			border: 3px solid #000;
			box-shadow: 4px 4px 0 #000;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			padding: 14px;
			cursor: pointer;
			min-height: 48px;
		}

		.auth-gate-panel button:active {
			transform: translate(4px, 4px);
			box-shadow: 0 0 0 #000;
		}

		#auth-gate-error {
			color: #f44336;
			font-size: 13px;
			font-weight: 700;
			text-align: center;
			margin-top: 12px;
			min-height: 1.2em;
		}

		.header-row {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 12px;
			margin-bottom: 16px;
		}

		.header-row h1 {
			margin-bottom: 0;
		}

		#lock-btn {
			background: #444;
			color: #aaa;
			border: 3px solid #000;
			box-shadow: 3px 3px 0 #000;
			font-size: 11px;
			font-weight: 700;
			text-transform: uppercase;
			padding: 8px 10px;
			cursor: pointer;
			min-height: auto;
		}

		#lock-btn[hidden] {
			display: none !important;
		}
	</style>
</head>
<body>
	<div id="auth-gate" hidden>
		<div class="auth-gate-panel">
			<h2>Operator Token</h2>
			<input type="password" id="auth-token-input" autocomplete="off" inputmode="text" placeholder="Enter token">
			<button type="button" onclick="unlockController()">Unlock</button>
			<p id="auth-gate-error"></p>
		</div>
	</div>

	<div id="controller-main">
	<div class="header-row">
		<h1>FGC Scoreboard</h1>
		<button type="button" id="lock-btn" onclick="lockController()" hidden>Lock</button>
	</div>

	<div id="no-bin-warning">
		No bin ID found. Add <strong>?bin=YOUR_ID</strong> to the URL.<br>
		Create a free bin at <a href="https://www.npoint.io" target="_blank" style="color:#ffeb3b;">npoint.io</a>
	</div>

	<div class="players-grid">
		<section class="player-section p1">
			<h2>Player 1</h2>
			<div class="field-row">
				<div class="field">
					<label>Name</label>
					<input type="text" id="p1Name" placeholder="Player 1" maxlength="64">
				</div>
				<div class="field field-team">
					<label>Team</label>
					<input type="text" id="p1Team" placeholder="Team" maxlength="32">
				</div>
			</div>
			<div class="score-stepper">
				<button type="button" class="score-btn" onclick="adjustScore('p1Score', -1)" tabindex="-1" aria-label="Decrease P1 score">&minus;</button>
				<input type="text" id="p1Score" value="0" class="score-display" inputmode="numeric" pattern="[0-9]*" maxlength="2" aria-label="P1 score" onblur="commitScore('p1Score')" oninput="filterScoreInput('p1Score')" onkeydown="handleScoreKeydown(event, 'p1Score')">
				<button type="button" class="score-btn" onclick="adjustScore('p1Score', 1)" tabindex="-1" aria-label="Increase P1 score">+</button>
			</div>
		</section>

		<section class="player-section p2">
			<h2>Player 2</h2>
			<div class="field-row">
				<div class="field">
					<label>Name</label>
					<input type="text" id="p2Name" placeholder="Player 2" maxlength="64">
				</div>
				<div class="field field-team">
					<label>Team</label>
					<input type="text" id="p2Team" placeholder="Team" maxlength="32">
				</div>
			</div>
			<div class="score-stepper">
				<button type="button" class="score-btn" onclick="adjustScore('p2Score', -1)" tabindex="-1" aria-label="Decrease P2 score">&minus;</button>
				<input type="text" id="p2Score" value="0" class="score-display" inputmode="numeric" pattern="[0-9]*" maxlength="2" aria-label="P2 score" onblur="commitScore('p2Score')" oninput="filterScoreInput('p2Score')" onkeydown="handleScoreKeydown(event, 'p2Score')">
				<button type="button" class="score-btn" onclick="adjustScore('p2Score', 1)" tabindex="-1" aria-label="Increase P2 score">+</button>
			</div>
		</section>
	</div>

	<section class="match-section">
		<h2>Match Info</h2>
		<div class="field-row">
			<div class="field">
				<label>Round</label>
				<input type="text" id="round" placeholder="e.g. Grand Finals" maxlength="64">
			</div>
			<div class="field">
				<label>Game</label>
				<input type="text" id="game" list="games" placeholder="e.g. SF6" maxlength="32">
				<datalist id="games">
					<option value="BBCF">
					<option value="BBTAG">
					<option value="DBFZ">
					<option value="GGXRD">
					<option value="KOFXIV">
					<option value="MVCI">
					<option value="SF6">
					<option value="SFVCE">
					<option value="TEKKEN7">
					<option value="UMVC3">
					<option value="UNICLR">
					<option value="USF4">
				</datalist>
			</div>
		</div>
	</section>

	<div class="button-row">
		<button class="btn-save" onclick="save()">Save</button>
		<button class="btn-swap" onclick="swap()">Swap</button>
	</div>
	<div class="button-row">
		<button class="btn-reset" onclick="resetScores()">Reset</button>
		<button class="btn-clear" onclick="clearAll()">Clear</button>
	</div>

	<div id="status">&nbsp;</div>
	</div>

	<script>
		var AUTH_STORAGE_KEY = 'fgc-auth-token';
		var authRequired = false;

		var urlParams = new URLSearchParams(window.location.search);
		var binId = urlParams.get('bin');
		var apiUrl = binId ? 'https://api.npoint.io/' + binId : null;
		var lanMode = !binId && window.location.protocol !== 'file:';
		var localMode = !apiUrl && !lanMode;

		var bootstrapToken = urlParams.get('token');
		if (bootstrapToken) {
			sessionStorage.setItem(AUTH_STORAGE_KEY, bootstrapToken);
			urlParams.delete('token');
			var cleanQuery = urlParams.toString();
			var cleanUrl = window.location.pathname + (cleanQuery ? '?' + cleanQuery : '');
			history.replaceState(null, '', cleanUrl);
		}

		function getAuthToken() {
			return sessionStorage.getItem(AUTH_STORAGE_KEY) || '';
		}

		function setAuthToken(token) {
			if (token) sessionStorage.setItem(AUTH_STORAGE_KEY, token);
			else sessionStorage.removeItem(AUTH_STORAGE_KEY);
		}

		function authHeaders(extra) {
			var h = Object.assign({}, extra || {});
			var token = getAuthToken();
			if (token) h['Authorization'] = 'Bearer ' + token;
			return h;
		}

		function authFetch(url, options) {
			options = options || {};
			options.headers = authHeaders(options.headers);
			return fetch(url, options);
		}

		function showAuthGate() {
			document.getElementById('auth-gate').hidden = false;
			document.getElementById('lock-btn').hidden = true;
		}

		function hideAuthGate() {
			document.getElementById('auth-gate').hidden = true;
			if (authRequired) document.getElementById('lock-btn').hidden = false;
		}

		function verifyToken() {
			return authFetch(window.location.origin + '/auth/check')
				.then(function(r) {
					if (r.status === 204) {
						hideAuthGate();
						return true;
					}
					setAuthToken('');
					showAuthGate();
					return false;
				})
				.catch(function() {
					setAuthToken('');
					showAuthGate();
					return false;
				});
		}

		function unlockController() {
			var input = document.getElementById('auth-token-input');
			var errEl = document.getElementById('auth-gate-error');
			setAuthToken(input.value.trim());
			errEl.textContent = '';
			verifyToken().then(function(ok) {
				if (!ok) errEl.textContent = 'Invalid token';
				else input.value = '';
			});
		}

		function lockController() {
			setAuthToken('');
			document.getElementById('auth-token-input').value = '';
			document.getElementById('auth-gate-error').textContent = '';
			showAuthGate();
		}

		if (lanMode) {
			console.log('LAN MODE');
			var warning = document.getElementById('no-bin-warning');
			warning.textContent = 'LAN mode \u2014 connected to ' + window.location.host;
			warning.style.display = 'block';
		} else if (localMode) {
			console.log('LOCAL MODE');
			var warning = document.getElementById('no-bin-warning');
			warning.textContent = 'Local mode \u2014 data saved to this browser only.';
			warning.style.display = 'block';
		}

		function populateForm(data) {
			document.getElementById('p1Name').value = data.p1Name || '';
			document.getElementById('p1Team').value = data.p1Team || '';
			document.getElementById('p1Score').value = data.p1Score || '0';
			document.getElementById('p2Name').value = data.p2Name || '';
			document.getElementById('p2Team').value = data.p2Team || '';
			document.getElementById('p2Score').value = data.p2Score || '0';
			document.getElementById('round').value = data.round || '';
			document.getElementById('game').value = data.game || '';
		}

		function loadLanData() {
			showStatus('Loading...', 'loading');
			authFetch(window.location.origin + '/scoreboard.json')
				.then(function(r) { return r.json(); })
				.then(function(data) {
					if (data.p1Name !== undefined) populateForm(data);
					showStatus('Loaded', 'ok');
				})
				.catch(function() {
					showStatus('Could not load data from server', 'err');
				});
		}

		function initAuthGate() {
			authFetch(window.location.origin + '/scoreboard.json')
				.then(function(r) {
					authRequired = r.headers.get('X-FGC-Auth-Required') === '1';
					if (!authRequired) {
						return r.json().then(function(data) {
							if (data.p1Name !== undefined) populateForm(data);
							showStatus('Loaded', 'ok');
						});
					}
					showStatus('Loading...', 'loading');
					if (getAuthToken()) {
						return verifyToken().then(function(ok) {
							if (ok) loadLanData();
							else showStatus('Enter token to continue', 'err');
						});
					}
					showAuthGate();
					showStatus('Enter token to continue', 'err');
				})
				.catch(function() {
					showStatus('Could not load data from server', 'err');
				});
		}

		// Load current state on page load
		if (apiUrl) {
			showStatus('Loading...', 'loading');
			fetch(apiUrl)
				.then(function(r) { return r.json(); })
				.then(function(data) {
					if (data.p1Name !== undefined) populateForm(data);
					showStatus('Loaded', 'ok');
				})
				.catch(function() {
					showStatus('Could not load data from bin', 'err');
				});
		} else if (lanMode) {
			initAuthGate();
		} else {
			var stored = localStorage.getItem('fgc-scoreboard-data');
			if (stored) {
				try {
					populateForm(JSON.parse(stored));
				} catch(e) {
					console.warn('Failed to parse localStorage data:', e);
				}
			}
		}

		function normalizeScore(id) {
			var input = document.getElementById(id);
			var val = parseInt(input.value, 10);
			if (isNaN(val)) val = 0;
			val = Math.max(0, Math.min(99, val));
			input.value = String(val);
			return val;
		}

		function commitScore(id) {
			normalizeScore(id);
			save();
		}

		function filterScoreInput(id) {
			var input = document.getElementById(id);
			var digits = input.value.replace(/\D/g, '');
			if (digits !== input.value) input.value = digits;
		}

		function handleScoreKeydown(e, id) {
			if (e.key === 'Enter') {
				e.preventDefault();
				document.getElementById(id).blur();
			}
		}

		function adjustScore(id, delta) {
			var input = document.getElementById(id);
			var val = parseInt(input.value, 10) || 0;
			input.value = String(val + delta);
			normalizeScore(id);
			save();
		}

		function getFormData() {
			var p1Raw = parseInt(document.getElementById('p1Score').value, 10) || 0;
			var p2Raw = parseInt(document.getElementById('p2Score').value, 10) || 0;
			return {
				p1Name: document.getElementById('p1Name').value,
				p1Team: document.getElementById('p1Team').value,
				p1Score: String(Math.max(0, Math.min(99, p1Raw))),
				p2Name: document.getElementById('p2Name').value,
				p2Team: document.getElementById('p2Team').value,
				p2Score: String(Math.max(0, Math.min(99, p2Raw))),
				round: document.getElementById('round').value,
				game: document.getElementById('game').value,
				timestamp: String(Math.floor(Date.now() / 1000))
			};
		}

		var isSaving = false;
		function save() {
			if (isSaving) return;
			if (lanMode && authRequired && !getAuthToken()) return;
			var formData = getFormData();
			if (localMode) {
				try {
					localStorage.setItem('fgc-scoreboard-data', JSON.stringify(formData));
					showStatus('Saved (local)', 'ok');
				} catch(e) {
					showStatus('Save failed: ' + e.message, 'err');
				}
				return;
			}
			isSaving = true;
			var saveUrl = lanMode ? window.location.origin + '/scoreboard.json' : apiUrl;
			showStatus('Saving...', 'loading');
			var fetchFn = lanMode ? authFetch : fetch;
			var postHeaders = { 'Content-Type': 'application/json' };
			fetchFn(saveUrl, {
				method: 'POST',
				headers: postHeaders,
				body: JSON.stringify(formData)
			})
			.then(function(r) {
				if (r.status === 401 && lanMode) {
					setAuthToken('');
					showAuthGate();
					showStatus('Session expired \u2014 re-enter token', 'err');
					throw new Error('auth');
				}
				if (!r.ok) throw new Error('HTTP ' + r.status);
				showStatus(lanMode ? 'Saved (LAN)' : 'Saved', 'ok');
			})
			.catch(function(e) {
				showStatus('Save failed \u2014 check server connection', 'err');
			})
			.finally(function() {
				isSaving = false;
			});
		}

		function swap() {
			var fields = ['Name', 'Team', 'Score'];
			fields.forEach(function(f) {
				var p1 = document.getElementById('p1' + f);
				var p2 = document.getElementById('p2' + f);
				var tmp = p1.value;
				p1.value = p2.value;
				p2.value = tmp;
			});
		}

		function resetScores() {
			document.getElementById('p1Score').value = '0';
			document.getElementById('p2Score').value = '0';
		}

		function clearAll() {
			document.getElementById('p1Name').value = '';
			document.getElementById('p1Team').value = '';
			document.getElementById('p1Score').value = '0';
			document.getElementById('p2Name').value = '';
			document.getElementById('p2Team').value = '';
			document.getElementById('p2Score').value = '0';
			document.getElementById('round').value = '';
			document.getElementById('game').value = '';
		}

		var statusTimeoutId = null;
		function showStatus(msg, type) {
			var el = document.getElementById('status');
			if (statusTimeoutId !== null) {
				clearTimeout(statusTimeoutId);
				statusTimeoutId = null;
			}
			el.textContent = msg;
			el.className = 'status-' + type;
			el.style.visibility = 'visible';
			if (type === 'ok') {
				statusTimeoutId = setTimeout(function() {
					el.style.visibility = 'hidden';
					el.textContent = '\u00a0';
					statusTimeoutId = null;
				}, 2000);
			}
		}
	</script>
</body>
</html>
